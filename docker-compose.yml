services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: dsa-mentor-worker:local
    container_name: dsa-mentor-worker
    env_file:
      - .env
    ports:
      - "${WORKER_PORT:-5000}:5000"
    # Keeps the process (and its internal node-cron scheduler) alive across
    # crashes/restarts — the refresh cron only fires while this container is
    # actually running, so this matters more than for a typical stateless API.
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
